<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Love Fridge AR Prototype</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
#panel{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:none;
font-family:sans-serif;
max-width:250px;
}
</style>

</head>

<body style="margin:0; overflow:hidden;">

<div id="panel"></div>

<a-scene embedded arjs>

<a-marker type="pattern" url="pattern-knosterfridgear.patt">

<!-- Origin Story Node -->
<a-sphere id="originNode"
position="-1 1 0"
radius="0.2"
color="#4CC3D9">
</a-sphere>

<!-- How it Works Node -->
<a-sphere id="systemNode"
position="0 1 0"
radius="0.2"
color="#7BC8A4">
</a-sphere>

<!-- Community Node -->
<a-sphere id="communityNode"
position="1 1 0"
radius="0.2"
color="#FF6B6B">
</a-sphere>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const panel = document.getElementById("panel");

function showPanel(text){
panel.style.display = "block";
panel.innerHTML = text;
}

document.querySelector("#originNode").addEventListener("click", () => {
showPanel("This fridge is part of a mutual aid network created during the pandemic to help neighbors share food.");
});

document.querySelector("#systemNode").addEventListener("click", () => {
showPanel("Community fridges allow anyone to leave food or take food freely without stigma.");
});

document.querySelector("#communityNode").addEventListener("click", () => {
showPanel("Visitors can leave notes or stories about their experiences with this fridge.");
});

</script>

</body>
</html>
